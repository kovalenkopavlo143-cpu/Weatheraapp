 <!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="/CSS/style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <title>WeatherTOday</title>
</head>

<body>
    <div class="appwindow">
        <h1 class="webtitle">WeatherTOday</h1>
        <p class="today">Today <span id="date"></span></p>
    </div>
    <div class="city_search_container">
        <div class="search_flex">
            <input type="text" class="city_search_input" placeholder="Enter your city">
            <button id="Enter" class="btn_forsearch">
                <i class="fa-solid fa-magnifying-glass"></i>
            </button>
        </div>
        <div class="weather">
            <h2 class="weather--city">New York</h2>
            <div class="weather_temp">
                <h2 class="weather--temp">22℃</h2>
                <img src="https://cdn-icons-png.flaticon.com/512/869/869869.png" class="weather_icon" alt="icon">
            </div>
        </div>
        <div class="details_weather">
            <div class="Weather_col">
                <i class="fa-solid fa-wind"></i>
                <div>
                    <p>Wind</p>
                    <p id="wind" class="wind_inf">15m/s</p>
                </div>
            </div>
            <div class="Weather_col">
                <i class="fa-solid fa-droplet"></i>
                <div>
                    <p>air humidity</p>
                    <p id="Humidty" class="Hum_inf">50%</p>
                </div>
            </div>
        </div>
    </div>
    <script src="/JavaScript/script.Js"></script>
</body>


</html>
